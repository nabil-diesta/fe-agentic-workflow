<div class="shell">
  <header class="topbar">
    <span class="logo">Niesta</span>
    <div class="topbar-actions">
      <button type="button" class="status-dot" [class.online]="connection.listenerOnline()" [class.offline]="!connection.listenerOnline()" [title]="connection.listenerOnline() ? 'Listener online' : 'Listener offline'"></button>
      <button type="button" class="theme-toggle" (click)="theme.toggle()" [attr.aria-label]="theme.theme() === 'dark' ? 'Switch to light' : 'Switch to dark'">
        {{ theme.theme() === 'dark' ? '☀️' : '🌙' }}
      </button>
    </div>
  </header>
  <aside class="sidebar">
    <nav>
      <a routerLink="/sprint" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Sprint Board</a>
      <a routerLink="/chat" routerLinkActive="active">Chat</a>
      <a routerLink="/sessions" routerLinkActive="active">Codex Sessions</a>
      <a routerLink="/settings" routerLinkActive="active">Settings</a>
    </nav>
  </aside>
  <main class="content">
    <router-outlet />
  </main>
</div>
